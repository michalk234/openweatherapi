<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
  <meta name="description" content="Simple weather dashboard built with vanilla JS in MVC-ready structure." />
  <link rel="stylesheet" href="./src/ui/styles/main.css" />
</head>
<body>
  <div class="page-shell">
    <div class="cloud cloud-a"></div>
    <div class="cloud cloud-b"></div>
    <div class="cloud cloud-c"></div>

    <main class="app-shell">
      <header id="searchBarRoot"></header>
      <section class="dashboard-grid">
        <div id="currentWeatherRoot"></div>
        <div id="weatherDetailsRoot"></div>
      </section>
      <section id="forecastRoot"></section>
    </main>
  </div>

  <script type="module" src="./src/ui/app.js"></script>
</body>
</html>
